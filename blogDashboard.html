<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechKraftiers Admin Control</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
body { font-family: 'Poppins', Arial, sans-serif; background:#eef2f7; margin:0; padding-bottom: 50px;}
.top-bar { background:#1e1b4b; color:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; }
.container { width:95%; max-width:950px; margin:25px auto; background:white; padding:25px; border-radius:12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
.input, textarea { width:100%; padding:12px; margin-bottom:14px; border:1px solid #ccc; border-radius:8px; box-sizing: border-box; font-size: 14px; }
.save-btn { background:#16a34a; padding:12px 20px; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; width:100%; font-size:16px; margin-bottom: 20px; transition: 0.3s; }
.save-btn:hover { opacity: 0.9; }
table { width:100%; border-collapse: collapse; margin-top:10px; margin-bottom:30px; }
th, td { padding:12px; border-bottom:1px solid #e5e7eb; text-align:left; font-size: 14px; }
th { background:#f1f5f9; color: #1e1b4b; }
.btn-edit { background:#2563eb; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:600; margin-right:5px;}
.btn-delete { background:#dc2626; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:600;}
hr { margin: 40px 0; border: 0; border-top: 1px solid #cbd5e1; }
h2 { color: #1e1b4b; margin-top: 0; font-size: 22px; display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<div class="top-bar">
    <h2><i class="fas fa-user-cog"></i> TechKraftiers Core Admin Control Panel</h2>
</div>

<div class="container">
    <h2><i class="fas fa-graduation-cap"></i> Manage Live Courses</h2>
    <input type="hidden" id="course_index" value="-1">
    <input id="course_title" class="input" placeholder="Course Title">
    <input id="course_image" class="input" placeholder="Course Card Image URL">
    <input id="course_date" class="input" placeholder="Batch Starting Date (e.g., Starts: 25 June 2026)">
    <textarea id="course_desc" class="input" rows="3" placeholder="Short course layout description..."></textarea>
    <button id="course_btn" class="save-btn" onclick="saveCourseLocal()">Save & Publish Course</button>

    <h3>Active Courses Log</h3>
    <table>
        <thead><tr><th>Course Title</th><th>Starting Date</th><th>Actions</th></tr></thead>
        <tbody id="courseTable"></tbody>
    </table>

    <hr>

    <h2><i class="fas fa-blog"></i> Manage Dynamic Blog Posts</h2>
    <input type="hidden" id="blog_index" value="-1">
    <input id="blog_title" class="input" placeholder="Blog Heading / Title">
    <input id="blog_image" class="input" placeholder="Blog Main Image URL">
    <textarea id="blog_desc" class="input" rows="4" placeholder="Write full descriptive blog text content here..."></textarea>
    <button id="blog_btn" class="save-btn" onclick="saveBlogLocal()" style="background:#6366f1;">Save & Publish Blog</button>

    <h3>Active Blogs Log</h3>
    <table>
        <thead><tr><th>Blog Title</th><th>Actions</th></tr></thead>
        <tbody id="blogTable"></tbody>
    </table>
</div>


<script>
document.addEventListener("DOMContentLoaded", function() {
    loadCoursesLocal();
    loadBlogsLocal();
});

/* LIVE COURSES LOGIC */
function saveCourseLocal() {
    let title = document.getElementById("course_title").value;
    let image = document.getElementById("course_image").value || "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500";
    let batch_date = document.getElementById("course_date").value;
    let description = document.getElementById("course_desc").value;
    let index = parseInt(document.getElementById("course_index").value);

    if(!title || !batch_date || !description) return alert("All fields are required!");

    let courses = JSON.parse(localStorage.getItem("courses") || "[]");

    if (index === -1) {
        courses.push({ title, image, batch_date, description });
        alert("Course added successfully!");
    } else {
        courses[index] = { title, image, batch_date, description };
        alert("Course updated!");
        document.getElementById("course_index").value = "-1";
        document.getElementById("course_btn").innerText = "Save & Publish Course";
        document.getElementById("course_btn").style.background = "#16a34a";
    }
    
    localStorage.setItem("courses", JSON.stringify(courses));
    clearCourseInputs();
    loadCoursesLocal();
}

function loadCoursesLocal() {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");
    let tbody = document.getElementById("courseTable");
    tbody.innerHTML = "";
    courses.forEach((c, index) => {
        tbody.innerHTML += `<tr>
            <td><strong>${c.title}</strong></td>
            <td>${c.batch_date}</td>
            <td>
                <button class="btn-edit" onclick="editCourse(${index})"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn-delete" onclick="deleteCourse(${index})"><i class="fas fa-trash"></i> Delete</button>
            </td>
        </tr>`;
    });
}

function editCourse(index) {
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");
    let c = courses[index];
    document.getElementById("course_title").value = c.title;
    document.getElementById("course_image").value = c.image;
    document.getElementById("course_date").value = c.batch_date;
    document.getElementById("course_desc").value = c.description;
    document.getElementById("course_index").value = index;
    document.getElementById("course_btn").innerText = "Update Course Details";
    document.getElementById("course_btn").style.background = "#f59e0b";
}

function deleteCourse(index) {
    if(confirm("Do you want to delete this course permanently?")) {
        let courses = JSON.parse(localStorage.getItem("courses") || "[]");
        courses.splice(index, 1);
        localStorage.setItem("courses", JSON.stringify(courses));
        loadCoursesLocal();
    }
}

function clearCourseInputs() {
    document.getElementById("course_title").value = '';
    document.getElementById("course_image").value = '';
    document.getElementById("course_date").value = '';
    document.getElementById("course_desc").value = '';
    document.getElementById("course_index").value = "-1";
}

/* DYNAMIC BLOGS LOGIC */
function saveBlogLocal() {
    let title = document.getElementById("blog_title").value;
    let image = document.getElementById("blog_image").value || "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=500";
    let description = document.getElementById("blog_desc").value;
    let index = parseInt(document.getElementById("blog_index").value);

    if(!title || !description) return alert("Title and Description are required!");

    let blogs = JSON.parse(localStorage.getItem("blogs") || "[]");

    if (index === -1) {
        blogs.push({ title, image, description });
        alert("Blog added successfully!");
    } else {
        blogs[index] = { title, image, description };
        alert("Blog updated!");
        document.getElementById("blog_index").value = "-1";
        document.getElementById("blog_btn").innerText = "Save & Publish Blog";
        document.getElementById("blog_btn").style.background = "#6366f1";
    }
    
    localStorage.setItem("blogs", JSON.stringify(blogs));
    clearBlogInputs();
    loadBlogsLocal();
}


function loadBlogsLocal() {
    let blogs = JSON.parse(localStorage.getItem("blogs") || "[]");
    let tbody = document.getElementById("blogTable");
    tbody.innerHTML = "";
    blogs.forEach((b, index) => {
        tbody.innerHTML += `<tr>
            <td><strong>${b.title}</strong></td>
            <td>
                <button class="btn-edit" onclick="editBlog(${index})"><i class="fas fa-edit"></i> Edit</button>
                <button class="btn-delete" onclick="deleteBlog(${index})"><i class="fas fa-trash"></i> Delete</button>
            </td>
        </tr>`;
    });
}

function editBlog(index) {
    let blogs = JSON.parse(localStorage.getItem("blogs") || "[]");
    let b = blogs[index];
    document.getElementById("blog_title").value = b.title;
    document.getElementById("blog_image").value = b.image;
    document.getElementById("blog_desc").value = b.description;
    document.getElementById("blog_index").value = index;
    
    document.getElementById("blog_btn").innerText = "Update Blog Content";
    document.getElementById("blog_btn").style.background = "#f59e0b";
}

function deleteBlog(index) {
    if(confirm("Do you want to delete this blog permanently?")) {
        let blogs = JSON.parse(localStorage.getItem("blogs") || "[]");
        blogs.splice(index, 1);
        localStorage.setItem("blogs", JSON.stringify(blogs));
        loadBlogsLocal();
    }
}

function clearBlogInputs() {
    document.getElementById("blog_title").value = '';
    document.getElementById("blog_image").value = '';
    document.getElementById("blog_desc").value = '';
    document.getElementById("blog_index").value = "-1";
}

function saveCourse() {
    // 1. Inputs se value lijiye
    let title = document.getElementById("course_title").value;
    let link = document.getElementById("course_link").value;
    
    // Check karein ki khali na ho
    if(!title || !link) {
        alert("Fill both title aur link!");
        return;
    }

    // 2. LocalStorage se data lijiye
    let courses = JSON.parse(localStorage.getItem("courses") || "[]");
    
    // 3. Naya course object add kariye
    courses.push({ title: Data, link: analytics_orange_white_curriculum_black.html });
    
    // 4. Wapas save kariye
    localStorage.setItem("courses", JSON.stringify(courses));
    
    alert("Course added successfully!");
    
    // 5. Inputs clear kariye
    document.getElementById("course_title").value = "";
    document.getElementById("course_link").value = "";
}

</script>
</body>
</html>
